<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#1e293b"/>
  <title>Tokyo & Atami Trip 2026</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            winter: {50:'#f0f8ff',100:'#e6f2ff',200:'#cfe6ff',300:'#a8d4ff',400:'#7cc0ff',
                     500:'#56acee',600:'#3a90d5',700:'#2e75ad',800:'#245f8d',900:'#1e4f76'}
          },
          boxShadow:{ soft:'0 12px 30px rgba(30,79,118,.18)', card:'0 8px 20px rgba(30,79,118,.14)'},
          borderRadius:{ pill:'32px' }
        }
      }
    }
  </script>

  <!-- Vue & Chart.js -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
    html,body{height:100%}
    body{
      background-color: #0b1329;
      -webkit-font-smoothing: antialiased;
    }
    .bg-mount{position:fixed; inset:0; z-index:-1; opacity:.85;
      background-image:url('https://images.unsplash.com/photo-1533105079780-92b9be482077?q=80&w=1600&auto=format&fit=crop');
      background-size:cover; background-position:center; filter:brightness(0.95) saturate(110%);}
    .glass{background:rgba(255,255,255,.28); backdrop-filter:blur(16px) saturate(115%);}
    .glass-dark{background:rgba(15, 23, 42, 0.45); backdrop-filter:blur(16px) saturate(120%); border: 1px solid rgba(255,255,255,0.1);}
    .tag-title{display:inline-block; padding:.35rem .7rem; border-radius:.75rem; background:#fff; box-shadow:0 6px 14px rgba(0,0,0,.08);}
    .hide-scroll::-webkit-scrollbar{display:none} .hide-scroll{scrollbar-width:none}
    .safe-top{padding-top:var(--safe-top)} .safe-bottom{padding-bottom:var(--safe-bottom)}
    .frame{width:100vw; max-width:430px; margin:0 auto;}
  </style>
</head>
<body class="text-winter-900">
  <div class="bg-mount"></div>

  <div id="app" class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="safe-top">
      <div class="frame px-4 pt-2">
        <div class="flex items-center justify-between">
          <h1 class="text-lg font-semibold text-white drop-shadow-md">Tokyo & Atami Trip <span class="text-orange-400">🎆</span></h1>
          <button @click="fetchGoogleSheetsData" class="text-xs font-medium text-white bg-green-600/80 hover:bg-green-600 px-3 py-1 rounded-full backdrop-blur-sm shadow flex items-center gap-1">
            <span>🔄</span> {{ loading ? '同步中...' : '同步 XY 交叉矩陣' }}
          </button>
        </div>

        <!-- Day chips -->
        <div class="mt-3 flex items-center gap-2">
          <button class="rounded-xl px-3 py-2 text-sm font-medium shadow-card bg-white text-winter-800 border border-winter-200">
            行程
          </button>
          <div class="flex-1 overflow-x-auto hide-scroll">
            <div class="flex gap-2 min-w-max">
              <button v-for="d in days" :key="d.key"
                      @click="activeDayIndex=d.index"
                      class="px-3 py-2 rounded-2xl border text-sm font-medium transition"
                      :class="activeDayIndex===d.index?'bg-orange-500 text-white border-orange-500 shadow-soft':'bg-white/90 text-winter-900 border-winter-200 hover:bg-white'">
                <div class="text-[11px] opacity-80">Day {{ d.index+1 }}</div>
                <div class="font-semibold">{{ d.dateStr.slice(5,10) }}</div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 frame px-4 pb-32">
      <!-- 行程 (Schedule) -->
      <section v-show="activeTab==='schedule'" class="mt-4 space-y-4">
        <div class="glass-dark rounded-2xl text-white shadow-soft p-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-base">📅</span>
              <div>
                <div class="text-sm font-semibold">當日焦點 · {{ activeDay.dateStr }}</div>
                <div class="text-xs opacity-90">{{ weatherText || '已成功連接交叉定位調度表' }}</div>
              </div>
            </div>
            <button @click="promptWeather" class="text-xs bg-white/20 border border-white/30 px-2 py-1 rounded-lg">編輯</button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="tag-title text-winter-900 text-sm font-bold">當日時間軸 (XY 交叉點)</div>
        </div>

        <div class="space-y-2.5">
          <div v-for="ev in dayEvents" :key="ev.id" class="rounded-2xl bg-white/95 border border-winter-200 p-3 shadow-card flex items-center gap-4">
            <div class="bg-indigo-950 text-indigo-300 font-mono text-sm font-bold tracking-wider px-3 py-1 rounded-xl shadow-sm text-center min-w-[65px]">
              {{ ev.start }}
            </div>
            <div class="flex-1">
              <div class="font-semibold text-winter-900 text-[15px]">{{ ev.title }}</div>
            </div>
          </div>
          
          <div v-if="!dayEvents.length" class="text-sm text-white/90 bg-black/20 p-6 rounded-2xl backdrop-blur-sm text-center">
            📭 今日該欄位交叉點尚無安排。
          </div>
        </div>
      </section>

      <!-- Structural fallbacks for other menus -->
      <section v-show="activeTab==='map'" class="mt-6 text-white bg-black/20 p-4 rounded-xl">📍 地圖與景點收藏</section>
      <section v-show="activeTab==='budget'" class="mt-6 text-white bg-black/20 p-4 rounded-xl">💰 記帳帳目管理</section>
      <section v-show="activeTab==='shop'" class="mt-6 text-white bg-black/20 p-4 rounded-xl">🛍️ 購物清單清單</section>
      <section v-show="activeTab==='info'" class="mt-6 text-white bg-black/20 p-4 rounded-xl">ℹ️ 隨身打包物資</section>
    </main>

    <!-- Bottom Nav -->
    <footer class="safe-bottom fixed left-0 right-0 bottom-0 z-50">
      <div class="frame px-5 pb-3">
        <div class="glass rounded-pill shadow-soft px-2 py-2 grid grid-cols-5 items-center">
          <button @click="activeTab='schedule'" class="flex flex-col items-center gap-1 py-2 rounded-lg" :class="activeTab==='schedule' ? 'bg-white/60' : ''"><span>📅</span><span class="text-xs">行程</span></button>
          <button @click="activeTab='map'" class="flex flex-col items-center gap-1 py-2 rounded-lg" :class="activeTab==='map' ? 'bg-white/60' : ''"><span>🗺️</span><span class="text-xs">地圖</span></button>
          <button @click="activeTab='budget'" class="flex flex-col items-center gap-1 py-2 rounded-lg" :class="activeTab==='budget' ? 'bg-white/60' : ''"><span>💰</span><span class="text-xs">記帳</span></button>
          <button @click="activeTab='shop'" class="flex flex-col items-center gap-1 py-2 rounded-lg" :class="activeTab==='shop' ? 'bg-white/60' : ''"><span>🛍️</span><span class="text-xs">購物</span></button>
          <button @click="activeTab='info'" class="flex flex-col items-center gap-1 py-2 rounded-lg" :class="activeTab==='info' ? 'bg-white/60' : ''"><span>ℹ️</span><span class="text-xs">資訊</span></button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const { createApp } = Vue;
    createApp({
      data(){
        return {
          activeTab:'schedule', tripStart:new Date('2026-07-01'), tripDays:5, activeDayIndex:0, weatherText:'',
          loading: false,
          // ⚠️ 填入你的 Google Sheet ID 序號
          sheetId: '1EohSpcEyr66Au6imdd3UntlJqVPeW4l4_DHwa0Gaqeg', 
          schedule:{ eventsByDate:{} },
          map:{ pins:[] }, budget:{ rateJPYperHKD:18.0, items:[] }, shop:{ items:[] }, pack:{ items:[] }
        }
      },
      computed:{
        days(){
          const arr=[]; for(let i=0;i<this.tripDays;i++){
            const d=new Date(this.tripStart.getFullYear(),this.tripStart.getMonth(),this.tripStart.getDate()+i);
            arr.push({ index:i, key:d.toISOString().slice(0,10), dateStr:d.toISOString().slice(0,10) });
          }
          return arr;
        },
        activeDay(){ return this.days[this.activeDayIndex]; },
        dayEvents(){ 
          const list = this.schedule.eventsByDate[this.activeDay.key] || []; 
          return list.slice().sort((a,b)=>a.start.localeCompare(b.start)); 
        }
      },
      methods:{
        promptWeather(){ const t = prompt('輸入天氣/活動備註', this.weatherText); if(t!==null) this.weatherText = t; },
        async fetchGoogleSheetsData() {
          if (!this.sheetId || this.sheetId.includes('YOUR_SPREADSHEET_ID')) {
            alert('請先在程式碼第 189 行填入您的 Google Sheet ID！');
            return;
          }
          this.loading = true;
          const url = `https://docs.google.com/spreadsheets/d/${this.sheetId}/gviz/tq?tqx=out:csv&sheet=Schedule`;
          
          try {
            const res = await fetch(url);
            const text = await res.text();
            this.parseGridPivotMatrix(text);
          } catch (err) {
            console.error(err);
            alert('讀取失敗，請確認雲端硬碟內該 Sheet 是否已設為「知道連結的人均可查看觀看」。');
          } finally {
            this.loading = false;
          }
        },
        parseGridPivotMatrix(csvText) {
          const lines = csvText.split('\n').map(line => line.replace(/^"|"$/g, '').split('","'));
          if (lines.length === 0) return;
          
          // Row 1 (Index 0) gives us the Date Columns starting from B1 (index 1)
          const headerRow = lines[0];
          const dates = [];
          for (let col = 1; col < headerRow.length; col++) {
            const dateStr = headerRow[col] ? headerRow[col].trim() : '';
            if (!dateStr) break; // Break if no more columns/dates are populated
            dates.push(dateStr);
          }
          
          const newEvents = {};
          dates.forEach(d => { newEvents[d] = []; });
          
          // Times start down at Row 5 (Index 4)
          for (let i = 4; i < lines.length; i++) {
            const row = lines[i];
            if (!row || row.length === 0) continue;
            
            const timeSlot = row[0] ? row[0].trim() : '';
            if (!timeSlot) break; // Break row sequence if Time column is empty
            
            // Look down the columns matching our populated dates
            for (let dIdx = 0; dIdx < dates.length; dIdx++) {
              const colIdx = dIdx + 1; // offset by 1 because Column A is our time array
              const eventTitle = row[colIdx] ? row[colIdx].trim() : '';
              
              if (eventTitle) {
                const targetDateKey = dates[dIdx];
                newEvents[targetDateKey].push({
                  id: crypto.randomUUID(),
                  start: timeSlot,
                  title: eventTitle
                });
              }
            }
          }
          
          this.schedule.eventsByDate = newEvents;
          localStorage.setItem('tokyo_pivot_cache', JSON.stringify(newEvents));
        }
      },
      mounted(){
        const cache = localStorage.getItem('tokyo_pivot_cache');
        if (cache) this.schedule.eventsByDate = JSON.parse(cache);
        this.fetchGoogleSheetsData();
      }
    }).mount('#app');
  </script>
</body>
</html>
